version: "3.9"
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STEAM_API_KEY=${STEAM_API_KEY:-}
    restart: unless-stopped

  bot:
    build: ./backend
    command: python bot.py
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - api
    restart: unless-stopped